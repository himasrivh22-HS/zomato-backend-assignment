version: '3.8'

services:
  db:
    image: postgres:15
    container_name: taskflow_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: taskflow_backend
    depends_on:
      - db
    ports:
      - "8080:8080"
    env_file:
      - .env
    restart: always

volumes:
  postgres_data: